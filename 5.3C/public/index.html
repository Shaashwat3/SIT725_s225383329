<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books Catalog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Books Catalog</h1>
    <p class="subtitle">Read-only API with MongoDB using MVC</p>

    <div class="layout">
      <div class="left-panel">
        <h2>Book List</h2>
        <div id="books-list" class="books-list">
          <p>Loading books...</p>
        </div>
      </div>

      <div class="right-panel">
        <h2>Book Details</h2>
        <div id="book-details" class="book-details">
          <p>Click a book to view its details.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
