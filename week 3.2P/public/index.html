<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Explorer</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="blue darken-3">
    <div class="nav-wrapper container">
      <a href="#!" class="brand-logo">
        <i class="material-icons left">menu_book</i>Book Explorer
      </a>
      <ul class="right hide-on-med-and-down">
        <li><a href="#book-container">Books</a></li>
      </ul>
    </div>
  </nav>

  <!-- Content -->
  <div class="container">
    <h3 class="center-align">My Favourite Books</h3>
    <p class="center-align grey-text text-darken-1">
      Explore a collection of inspiring books fetched from a REST API.
    </p>

    <div class="row" id="book-container"></div>
  </div>

  <!-- Modal -->
  <div id="book-modal" class="modal">
    <div class="modal-content">
      <h4 id="modal-title"></h4>
      <p id="modal-author"></p>
      <p id="modal-description"></p>
    </div>
    <div class="modal-footer">
      <a href="#!" class="modal-close waves-effect waves-green btn">Close</a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
